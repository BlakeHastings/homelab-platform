# Reusable VM Provisioning Workflow
#
# Provisions a Proxmox VM via Terraform and configures it via Ansible.
# Called from any project repo:
#   uses: BlakeHastings/homelab-platform/.github/workflows/provision-vm.yml@main
#
# Secrets are pulled from self-hosted Infisical at job start using the official
# Infisical/secrets-action with **GitHub OIDC** auth — no static credentials
# are stored in any repo. The calling repo must:
#
#   1. Have a machine identity in Infisical with OIDC auth configured,
#      trust-bound to that repo (e.g. sub: repo:Owner/repo:ref:refs/heads/main).
#   2. Pass `infisical_identity_id` and `infisical_project_slug` as inputs.
#
# Required Infisical layout for the project (env slug `prod`):
#   /proxmox/     PROXMOX_VE_ENDPOINT, PROXMOX_VE_API_TOKEN,
#                 PROXMOX_VE_SSH_USERNAME, PROXMOX_VE_SSH_PASSWORD
#   /terraform/   TF_VAR_PROXMOX_NODE, TF_VAR_TEMPLATE_ID,
#                 TF_VAR_GATEWAY, TF_VAR_SSH_PUBLIC_KEY
#   /ansible/     ANSIBLE_PRIVATE_KEY

name: Provision VM (reusable)

on:
  workflow_call:
    inputs:
      vm_name:
        description: "VM hostname (e.g., dns-vm)"
        required: true
        type: string
      cpu_cores:
        description: "CPU cores"
        required: false
        type: number
        default: 2
      memory_mb:
        description: "Memory in MB"
        required: false
        type: number
        default: 4096
      disk_gb:
        description: "Root disk size in GB (minimum 30 — must be >= template disk size)"
        required: false
        type: number
        default: 40
      terraform_working_dir:
        description: "Path to the Terraform config directory, relative to repo root (e.g., services/dns/terraform)"
        required: true
        type: string
      observability_server_ip:
        description: "Observability VM IP for Alloy log shipping. Leave empty on first run (before observability-vm exists)."
        required: false
        type: string
        default: ""
      install_portainer_server:
        description: "Install Portainer Server CE on this VM. Only true for one designated management VM."
        required: false
        type: boolean
        default: false
      infisical_identity_id:
        description: "Infisical machine-identity ID (UUID) configured for OIDC auth, trust-bound to the calling repo."
        required: true
        type: string
      infisical_project_slug:
        description: "Infisical project slug (URL-friendly name from project settings)."
        required: true
        type: string
      infisical_domain:
        description: "Infisical server URL."
        required: false
        type: string
        default: "http://192.168.0.161"

    outputs:
      vm_ip:
        description: "IP address of the provisioned VM"
        value: ${{ jobs.provision.outputs.vm_ip }}

jobs:
  provision:
    name: "Provision ${{ inputs.vm_name }}"
    runs-on: [self-hosted, self-hosted-infra]
    permissions:
      id-token: write    # required for GitHub Actions OIDC token issuance
      contents: read
    outputs:
      vm_ip: ${{ steps.tf-output.outputs.vm_ip }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout homelab-platform (Ansible)
        uses: actions/checkout@v4
        with:
          repository: BlakeHastings/homelab-platform
          ref: main
          path: platform

      - name: Load Proxmox secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id:    ${{ inputs.infisical_identity_id }}
          project-slug:   ${{ inputs.infisical_project_slug }}
          env-slug:       prod
          secret-path:    /proxmox
          domain:         ${{ inputs.infisical_domain }}
          export-type:    env

      - name: Load Terraform secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id:    ${{ inputs.infisical_identity_id }}
          project-slug:   ${{ inputs.infisical_project_slug }}
          env-slug:       prod
          secret-path:    /terraform
          domain:         ${{ inputs.infisical_domain }}
          export-type:    env

      - name: Load Ansible secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id:    ${{ inputs.infisical_identity_id }}
          project-slug:   ${{ inputs.infisical_project_slug }}
          env-slug:       prod
          secret-path:    /ansible
          domain:         ${{ inputs.infisical_domain }}
          export-type:    env

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_working_dir }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ inputs.terraform_working_dir }}
        env:
          # Bridge UPPERCASE secret names from Infisical to the lowercase
          # variable names Terraform expects (TF_VAR_<lowercase>).
          TF_VAR_proxmox_node:   ${{ env.TF_VAR_PROXMOX_NODE }}
          TF_VAR_template_id:    ${{ env.TF_VAR_TEMPLATE_ID }}
          TF_VAR_gateway:        ${{ env.TF_VAR_GATEWAY }}
          TF_VAR_ssh_public_key: ${{ env.TF_VAR_SSH_PUBLIC_KEY }}
          TF_VAR_cpu_cores:      ${{ inputs.cpu_cores }}
          TF_VAR_memory_mb:      ${{ inputs.memory_mb }}
          TF_VAR_disk_gb:        ${{ inputs.disk_gb }}
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform_working_dir }}
        env:
          TF_VAR_proxmox_node:   ${{ env.TF_VAR_PROXMOX_NODE }}
          TF_VAR_template_id:    ${{ env.TF_VAR_TEMPLATE_ID }}
          TF_VAR_gateway:        ${{ env.TF_VAR_GATEWAY }}
          TF_VAR_ssh_public_key: ${{ env.TF_VAR_SSH_PUBLIC_KEY }}
          TF_VAR_cpu_cores:      ${{ inputs.cpu_cores }}
          TF_VAR_memory_mb:      ${{ inputs.memory_mb }}
          TF_VAR_disk_gb:        ${{ inputs.disk_gb }}
        run: terraform apply -input=false -auto-approve -no-color

      - name: Get VM IP
        id: tf-output
        working-directory: ${{ inputs.terraform_working_dir }}
        run: echo "vm_ip=$(terraform output -raw vm_ip)" >> $GITHUB_OUTPUT

      - name: Write SSH private key
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$ANSIBLE_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Wait for VM SSH to be reachable
        run: |
          VM_IP="${{ steps.tf-output.outputs.vm_ip }}"
          echo "Waiting for SSH on $VM_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
               -i "$HOME/.ssh/deploy_key" ubuntu@"$VM_IP" 'echo ok' 2>/dev/null; then
              echo "SSH is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: SSH did not become reachable within 5 minutes"
          exit 1

      - name: Run Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          VM_IP="${{ steps.tf-output.outputs.vm_ip }}"
          ansible-playbook \
            -i "$VM_IP," \
            platform/ansible/base-vm.yml \
            -e "ansible_user=ubuntu" \
            -e "ansible_ssh_private_key_file=$HOME/.ssh/deploy_key" \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -e "observability_server_ip=${{ inputs.observability_server_ip }}" \
            -e "install_portainer_server=${{ inputs.install_portainer_server }}"

      - name: Cleanup secrets from runner disk
        if: always()
        run: rm -f "$HOME/.ssh/deploy_key"
