---
# Generic Docker VM Setup Playbook
#
# Configures a fresh Ubuntu 24.04 VM (provisioned by Terraform) as a Docker host with:
#   Phase 1 — Docker + NVIDIA Container Toolkit (docker)
#   Phase 2 — Portainer Server, CE (portainer-server) — one designated mgmt VM only
#   Phase 3 — Portainer Agent (portainer-agent)
#   Phase 4 — Node Exporter (node-exporter)
#   Phase 5 — Grafana Alloy — log shipping to observability-vm (alloy)
#
# Usage (GitHub Actions calls this automatically via provision-vm.yml):
#   ansible-playbook -i "<VM_IP>," ansible/base-vm.yml \
#     -e "ansible_user=ubuntu" \
#     -e "ansible_ssh_private_key_file=~/.ssh/deploy_key" \
#     -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
#     -e "observability_server_ip=192.168.1.51" \
#     -e "install_portainer_server=true"   # mgmt VM only
#
# Tags: docker | portainer-server | portainer-agent | node-exporter | alloy

- name: Docker VM setup
  hosts: all
  vars_files:
    - vars/main.yml

  tasks:

    # =========================================================================
    # PHASE 0 — Wait for system readiness
    # =========================================================================

    - name: "[pre] Wait for cloud-init to complete"
      command: cloud-init status --wait
      become: true
      changed_when: false

    # =========================================================================
    # PHASE 0.1 — Hostname enforcement
    # cloud-init usually sets the hostname from vm_name, but at least one
    # VM in the fleet has drifted (searxng-gateway's hostname became
    # "terraform-runner", presumably from a misdirected playbook run). That
    # made the Alloy template render the wrong `node` label and silently
    # mislabel logs in Loki. Enforce match here.
    # =========================================================================

    - name: "[hostname] Ensure system hostname matches vm_name"
      ansible.builtin.hostname:
        name: "{{ vm_name }}"
      become: true
      when: vm_name is defined and vm_name | length > 0
      register: hostname_set
      tags: hostname

    - name: "[hostname] Re-gather facts if hostname changed"
      setup:
      when: hostname_set is defined and hostname_set.changed
      tags: hostname

    # =========================================================================
    # PHASE 0.5 — Resolver: route .lan queries to Technitium via systemd-resolved
    # Without this, Alloy can't resolve observability-vm.lan to push logs, and
    # workflows can't ssh to <vm>.lan names. dns-vm self-resolves via 127.0.0.1.
    # =========================================================================

    - name: "[dns-resolution] Ensure resolved.conf.d directory exists"
      file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: '0755'
      become: true
      tags: dns-resolution

    - name: "[dns-resolution] Drop-in routing .lan queries to Technitium"
      template:
        src: templates/technitium-resolved.conf.j2
        dest: /etc/systemd/resolved.conf.d/technitium.conf
        mode: '0644'
      become: true
      notify:
        - restart systemd-resolved
        - restart alloy
      tags: dns-resolution

    # =========================================================================
    # PHASE 1 — Docker
    # =========================================================================

    - name: "[docker] Install Docker via official install script"
      shell: curl -fsSL https://get.docker.com | bash
      become: true
      args:
        creates: /usr/bin/docker
      tags: docker

    - name: "[docker] Add {{ inference_user }} to docker group"
      user:
        name: "{{ inference_user }}"
        groups: docker
        append: true
      become: true
      tags: docker

    - name: "[docker] Reset connection to pick up docker group membership"
      meta: reset_connection
      tags: docker

    - name: "[docker] Verify Docker is running"
      command: docker info
      changed_when: false
      tags: docker

    # =========================================================================
    # PHASE 2 — Portainer Server (one designated management VM only)
    # Run with: -e "install_portainer_server=true"
    # =========================================================================

    - name: "[portainer-server] Run Portainer Server container"
      community.docker.docker_container:
        name: portainer
        image: portainer/portainer-ce:latest
        state: started
        restart_policy: unless-stopped
        pull: true
        ports:
          - "{{ portainer_server_port }}:9443"
          - "8000:8000"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "portainer_data:/data"
      when: install_portainer_server | default(false) | bool
      tags: portainer-server

    # =========================================================================
    # PHASE 3 — Portainer Agent
    # Connects to the Portainer Server on the management VM.
    # After provisioning, add this VM in Portainer UI:
    #   Settings → Environments → Add → Docker Standalone → Agent → <VM_IP>:9001
    # =========================================================================

    - name: "[portainer-agent] Run Portainer Agent container"
      community.docker.docker_container:
        name: portainer_agent
        image: portainer/agent:latest
        state: started
        restart_policy: unless-stopped
        pull: true
        ports:
          - "{{ portainer_agent_port }}:9001"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "/var/lib/docker/volumes:/var/lib/docker/volumes"
      tags: portainer-agent

    # =========================================================================
    # PHASE 4 — Node Exporter (system metrics → Prometheus on observability-vm)
    # =========================================================================

    - name: "[node-exporter] Run Node Exporter container"
      community.docker.docker_container:
        name: node-exporter
        image: quay.io/prometheus/node-exporter:latest
        state: started
        restart_policy: unless-stopped
        pull: true
        network_mode: host
        pid_mode: host
        volumes:
          - "/:/host:ro,rslave"
        command: "--path.rootfs=/host"
      tags: node-exporter

    # =========================================================================
    # PHASE 5 — Grafana Alloy (log shipping → Loki on observability-vm)
    # If observability_server_ip is empty, Alloy starts but cannot ship logs.
    # Re-run with --tags alloy -e "observability_server_ip=<IP>" once
    # observability-vm is provisioned.
    # =========================================================================

    - name: "[alloy] Create Alloy config directory"
      file:
        path: "{{ ansible_env.HOME }}/alloy"
        state: directory
        mode: "0750"
      tags: alloy

    - name: "[alloy] Render Alloy config from template"
      template:
        src: templates/alloy-config.j2
        dest: "{{ ansible_env.HOME }}/alloy/config.alloy"
        mode: "0640"
      notify: restart alloy   # bind-mount file change doesn't auto-restart the container
      tags: alloy

    - name: "[alloy] Run Grafana Alloy container"
      community.docker.docker_container:
        name: alloy
        image: grafana/alloy:latest
        state: started
        restart_policy: unless-stopped
        pull: true
        ports:
          - "12345:12345"
        volumes:
          - "{{ ansible_env.HOME }}/alloy/config.alloy:/etc/alloy/config.alloy"
          - "/var/log:/var/log:ro"
          - "/run/log/journal:/run/log/journal:ro"
          - "/var/run/docker.sock:/var/run/docker.sock"
        command: "run /etc/alloy/config.alloy"
      tags: alloy

    - name: "[alloy] Verify all containers are running"
      community.docker.docker_container_info:
        name: "{{ item }}"
      loop:
        - portainer_agent
        - node-exporter
        - alloy
      register: container_info
      tags: alloy

    - name: "[alloy] Show container states"
      debug:
        msg: "{{ item.container.Name }}: {{ item.container.State.Status }}"
      loop: "{{ container_info.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: alloy

  # =========================================================================
  # HANDLERS — fire at end of play if notified
  # =========================================================================
  handlers:
    - name: restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
      become: true

    # Restart the Alloy container when its bind-mounted config file changes
    # OR when system DNS changes (Alloy caches resolutions at startup).
    # docker_container's `restart: true` triggers a stop+start, which re-reads
    # the config and re-resolves the configured Loki endpoint.
    - name: restart alloy
      community.docker.docker_container:
        name: alloy
        state: started
        restart: true
