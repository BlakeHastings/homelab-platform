---
# Platform-level defaults — override via -e flags at runtime as needed.

# The Linux user that will own and run all services.
# On cloud-init VMs this is ubuntu.
inference_user: "{{ ansible_user_id }}"

# Portainer
portainer_agent_port: 9001           # Portainer Agent — reports to Portainer Server
portainer_server_port: 9443          # Portainer Server web UI (mgmt VM only)
install_portainer_server: false      # set to true for one designated management VM

# Observability endpoint for Alloy log shipping.
# Override with -e "observability_server_ip=<IP>" once observability-vm is up.
# Leave empty on first provisioning run (Alloy will start but not ship logs until set).
observability_server_ip: ""

# Terraform binary version (used by infra-runner.yml)
# Check latest at https://releases.hashicorp.com/terraform/
terraform_version: "1.9.8"

# GitHub Actions runner (used by infra-runner.yml)
# Check latest at https://github.com/actions/runner/releases
github_actions_runner_version: "2.323.0"
github_actions_runner_dir: "/home/ubuntu/actions-runner"
